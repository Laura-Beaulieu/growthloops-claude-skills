<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Analytics Dashboard</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #ff3b5c;
    --accent2: #25f4ee;
    --green: #4ecb71;
    --yellow: #f5c542;
    --orange: #ff8c42;
    --purple: #a855f7;
    --chart1: #ff3b5c;
    --chart2: #25f4ee;
    --chart3: #f5c542;
    --chart4: #a855f7;
    --chart5: #4ecb71;
    --chart6: #ff8c42;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
  }

  .header h1 span { color: var(--accent); }

  .header .handle {
    color: var(--accent2);
    font-size: 16px;
    font-weight: 500;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 80px 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin: 40px auto;
    max-width: 600px;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(255, 59, 92, 0.05);
  }

  .dropzone h2 { font-size: 20px; margin-bottom: 8px; }
  .dropzone p { color: var(--text-dim); font-size: 14px; }
  .dropzone input { display: none; }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
  }

  .stat-card .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .stat-card .value.accent { color: var(--accent); }
  .stat-card .value.teal { color: var(--accent2); }
  .stat-card .value.green { color: var(--green); }

  /* Filters */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filters select, .filters input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }

  .filters select:focus, .filters input:focus {
    border-color: var(--accent);
  }

  .filters input { width: 240px; }

  /* Charts grid */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .chart-card h3 {
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }

  .chart-container { position: relative; }

  /* Bar chart via CSS */
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .bar-label {
    width: 100px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    flex: 1;
    height: 28px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
    display: flex;
    align-items: center;
    padding-left: 8px;
  }

  .bar-value {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }

  .bar-value-outside {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 8px;
    white-space: nowrap;
  }

  /* Table */
  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .table-wrapper h3 {
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 16px 20px 0;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  th:hover { color: var(--text); }
  th.sorted-asc::after { content: " ▲"; color: var(--accent); }
  th.sorted-desc::after { content: " ▼"; color: var(--accent); }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--surface2);
    white-space: nowrap;
  }

  tr:hover td { background: var(--surface2); }

  .tier-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .tier-viral { background: rgba(255, 59, 92, 0.2); color: var(--accent); }
  .tier-strong { background: rgba(37, 244, 238, 0.2); color: var(--accent2); }
  .tier-average { background: rgba(245, 197, 66, 0.2); color: var(--yellow); }
  .tier-low { background: rgba(136, 136, 136, 0.2); color: var(--text-dim); }

  .hook-cell {
    max-width: 250px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .hidden { display: none; }

  .dashboard { display: none; }
  .dashboard.active { display: block; }

  .no-data {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }

  @media (max-width: 768px) {
    .container { padding: 16px; }
    .charts-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .filters { flex-direction: column; }
    .filters input { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>TikTok</span> Analytics Dashboard</h1>
  <div class="handle" id="handleDisplay"></div>
</div>

<div class="container">
  <!-- Drop zone -->
  <div class="dropzone" id="dropzone">
    <h2>Drop your analyzed_data.json here</h2>
    <p>Or click to browse. Generated by the tiktok-analytics skill.</p>
    <input type="file" id="fileInput" accept=".json">
  </div>

  <!-- Dashboard content (hidden until data loaded) -->
  <div class="dashboard" id="dashboard">

    <!-- Stat cards -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Filters -->
    <div class="filters">
      <select id="filterTier">
        <option value="">All Tiers</option>
        <option value="viral">Viral (10K+)</option>
        <option value="strong">Strong (5K-10K)</option>
        <option value="average">Average (1K-5K)</option>
        <option value="low">Low (&lt;1K)</option>
      </select>
      <select id="filterCategory">
        <option value="">All Categories</option>
      </select>
      <input type="text" id="filterSearch" placeholder="Search hooks, descriptions...">
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Tier Breakdown</h3>
        <div id="chartTier" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>Top 5 Videos by Views</h3>
        <div id="chartTop5" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>Avg Views by Day of Week</h3>
        <div id="chartDay" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>Avg Views by Hour</h3>
        <div id="chartHour" class="chart-container"></div>
      </div>
      <div class="chart-card" style="grid-column: 1 / -1;">
        <h3>Category Breakdown (Avg Views)</h3>
        <div id="chartCategory" class="chart-container"></div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <h3>All Videos</h3>
      <div class="table-scroll">
        <table>
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const dashboard = document.getElementById('dashboard');
  const handleDisplay = document.getElementById('handleDisplay');

  let allVideos = [];
  let filteredVideos = [];
  let sortCol = 'views';
  let sortDir = 'desc';

  // File handling
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        const videos = data.videos || data;
        if (!Array.isArray(videos) || videos.length === 0) {
          alert('No video data found in this file. Make sure you are loading analyzed_data.json.');
          return;
        }
        allVideos = videos;
        handleDisplay.textContent = data.handle ? '@' + data.handle : '';
        dropzone.style.display = 'none';
        dashboard.classList.add('active');
        populateFilters();
        applyFilters();
      } catch (err) {
        alert('Error parsing JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  // Filters
  function populateFilters() {
    const cats = [...new Set(allVideos.map(v => v.category).filter(Boolean))].sort();
    const sel = document.getElementById('filterCategory');
    sel.innerHTML = '<option value="">All Categories</option>';
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  document.getElementById('filterTier').addEventListener('change', applyFilters);
  document.getElementById('filterCategory').addEventListener('change', applyFilters);
  document.getElementById('filterSearch').addEventListener('input', applyFilters);

  function applyFilters() {
    const tier = document.getElementById('filterTier').value;
    const cat = document.getElementById('filterCategory').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();

    filteredVideos = allVideos.filter(v => {
      if (tier && v.tier !== tier) return false;
      if (cat && v.category !== cat) return false;
      if (search) {
        const hay = ((v.hook || '') + ' ' + (v.description || '') + ' ' + (v.category || '') + ' ' + (v.hook_style || '')).toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    renderStats();
    renderCharts();
    renderTable();
  }

  // Helpers
  function fmt(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toLocaleString();
  }

  function avg(arr) {
    if (!arr.length) return 0;
    return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
  }

  // Stats
  function renderStats() {
    const vids = filteredVideos;
    const totalViews = vids.reduce((s, v) => s + (v.views || 0), 0);
    const avgViews = vids.length ? Math.round(totalViews / vids.length) : 0;
    const avgEng = vids.length ? (vids.reduce((s, v) => s + (v.engagement_rate || 0), 0) / vids.length).toFixed(2) : '0';
    const viralCount = vids.filter(v => v.tier === 'viral').length;
    const top = vids.slice().sort((a, b) => (b.views || 0) - (a.views || 0))[0];

    const grid = document.getElementById('statsGrid');
    grid.innerHTML = `
      <div class="stat-card"><div class="label">Total Videos</div><div class="value">${vids.length}</div></div>
      <div class="stat-card"><div class="label">Total Views</div><div class="value accent">${fmt(totalViews)}</div></div>
      <div class="stat-card"><div class="label">Avg Views</div><div class="value teal">${fmt(avgViews)}</div></div>
      <div class="stat-card"><div class="label">Avg Engagement</div><div class="value green">${avgEng}%</div></div>
      <div class="stat-card"><div class="label">Viral Videos</div><div class="value accent">${viralCount}</div><div class="sub">${vids.length ? Math.round(viralCount / vids.length * 100) : 0}% of total</div></div>
      <div class="stat-card"><div class="label">Top Video</div><div class="value" style="font-size:14px;">${top ? (top.hook || 'No hook').substring(0, 50) : 'N/A'}</div><div class="sub">${top ? fmt(top.views) + ' views' : ''}</div></div>
    `;
  }

  // Charts
  function makeBarChart(container, data, colorFn) {
    const maxVal = Math.max(...data.map(d => d.value), 1);
    container.innerHTML = '';
    const chart = document.createElement('div');
    chart.className = 'bar-chart';

    data.forEach((d, i) => {
      const row = document.createElement('div');
      row.className = 'bar-row';

      const label = document.createElement('div');
      label.className = 'bar-label';
      label.textContent = d.label;
      label.title = d.label;

      const track = document.createElement('div');
      track.className = 'bar-track';

      const pct = Math.max((d.value / maxVal) * 100, 1);
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.width = pct + '%';
      fill.style.background = colorFn ? colorFn(d, i) : 'var(--accent)';

      if (pct > 20) {
        const valSpan = document.createElement('span');
        valSpan.className = 'bar-value';
        valSpan.textContent = fmt(d.value);
        fill.appendChild(valSpan);
      }

      track.appendChild(fill);

      if (pct <= 20) {
        const valOut = document.createElement('span');
        valOut.className = 'bar-value-outside';
        valOut.textContent = fmt(d.value);
        row.appendChild(label);
        row.appendChild(track);
        row.appendChild(valOut);
      } else {
        row.appendChild(label);
        row.appendChild(track);
      }

      chart.appendChild(row);
    });

    container.appendChild(chart);
  }

  const colors = ['var(--chart1)', 'var(--chart2)', 'var(--chart3)', 'var(--chart4)', 'var(--chart5)', 'var(--chart6)'];
  const tierColors = { viral: 'var(--accent)', strong: 'var(--accent2)', average: 'var(--yellow)', low: 'var(--text-dim)' };

  function renderCharts() {
    const vids = filteredVideos;

    // Tier breakdown
    const tiers = ['viral', 'strong', 'average', 'low'];
    const tierData = tiers.map(t => ({
      label: t.charAt(0).toUpperCase() + t.slice(1),
      value: vids.filter(v => v.tier === t).length,
      tier: t
    }));
    makeBarChart(document.getElementById('chartTier'), tierData, (d) => tierColors[d.tier]);

    // Top 5
    const top5 = vids.slice().sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 5);
    makeBarChart(
      document.getElementById('chartTop5'),
      top5.map(v => ({ label: (v.hook || 'No hook').substring(0, 30), value: v.views || 0 })),
      (_, i) => colors[i % colors.length]
    );

    // Day of week
    const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const dayMap = {};
    dayOrder.forEach(d => dayMap[d] = []);
    vids.forEach(v => { if (v.day_of_week && dayMap[v.day_of_week]) dayMap[v.day_of_week].push(v.views || 0); });
    makeBarChart(
      document.getElementById('chartDay'),
      dayOrder.map(d => ({ label: d.substring(0, 3), value: avg(dayMap[d]) })),
      (_, i) => colors[i % colors.length]
    );

    // Hour
    const hourBuckets = [
      { label: '6-9 AM', min: 6, max: 9 },
      { label: '9-12 PM', min: 9, max: 12 },
      { label: '12-3 PM', min: 12, max: 15 },
      { label: '3-6 PM', min: 15, max: 18 },
      { label: '6-9 PM', min: 18, max: 21 },
      { label: '9-12 AM', min: 21, max: 24 },
      { label: '12-6 AM', min: 0, max: 6 },
    ];
    const hourData = hourBuckets.map(b => {
      const views = vids.filter(v => v.hour_posted !== null && v.hour_posted >= b.min && v.hour_posted < b.max).map(v => v.views || 0);
      return { label: b.label, value: avg(views) };
    });
    makeBarChart(document.getElementById('chartHour'), hourData, (_, i) => colors[i % colors.length]);

    // Category
    const catMap = {};
    vids.forEach(v => {
      const c = v.category || 'Uncategorized';
      if (!catMap[c]) catMap[c] = [];
      catMap[c].push(v.views || 0);
    });
    const catData = Object.entries(catMap)
      .map(([label, views]) => ({ label, value: avg(views) }))
      .sort((a, b) => b.value - a.value);
    makeBarChart(document.getElementById('chartCategory'), catData, (_, i) => colors[i % colors.length]);
  }

  // Table
  const columns = [
    { key: 'date', label: 'Date', type: 'text' },
    { key: 'hook', label: 'Hook', type: 'hook' },
    { key: 'category', label: 'Category', type: 'text' },
    { key: 'hook_style', label: 'Hook Style', type: 'text' },
    { key: 'tier', label: 'Tier', type: 'tier' },
    { key: 'views', label: 'Views', type: 'num' },
    { key: 'likes', label: 'Likes', type: 'num' },
    { key: 'comments', label: 'Comments', type: 'num' },
    { key: 'shares', label: 'Shares', type: 'num' },
    { key: 'saves', label: 'Saves', type: 'num' },
    { key: 'engagement_rate', label: 'Eng %', type: 'pct' },
    { key: 'duration_seconds', label: 'Duration', type: 'dur' },
    { key: 'url', label: 'Link', type: 'link' },
  ];

  function renderTable() {
    // Head
    const thead = document.getElementById('tableHead');
    thead.innerHTML = '';
    columns.forEach(col => {
      const th = document.createElement('th');
      th.textContent = col.label;
      th.dataset.key = col.key;
      if (sortCol === col.key) th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
      th.addEventListener('click', () => {
        if (sortCol === col.key) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortCol = col.key;
          sortDir = 'desc';
        }
        renderTable();
      });
      thead.appendChild(th);
    });

    // Sort
    const sorted = filteredVideos.slice().sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (av == null) av = '';
      if (bv == null) bv = '';
      if (typeof av === 'number' && typeof bv === 'number') {
        return sortDir === 'asc' ? av - bv : bv - av;
      }
      av = String(av); bv = String(bv);
      return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    });

    // Body
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    sorted.forEach(v => {
      const tr = document.createElement('tr');
      columns.forEach(col => {
        const td = document.createElement('td');
        const val = v[col.key];

        switch (col.type) {
          case 'hook':
            td.className = 'hook-cell';
            td.textContent = val || '';
            td.title = v.description || val || '';
            break;
          case 'tier':
            td.innerHTML = `<span class="tier-badge tier-${val || 'low'}">${val || 'low'}</span>`;
            break;
          case 'num':
            td.textContent = val != null ? fmt(val) : '0';
            break;
          case 'pct':
            td.textContent = val != null ? val.toFixed(2) + '%' : '0%';
            break;
          case 'dur':
            if (val) {
              const m = Math.floor(val / 60);
              const s = val % 60;
              td.textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
            } else {
              td.textContent = '-';
            }
            break;
          case 'link':
            if (val) {
              td.innerHTML = `<a href="${val}" target="_blank" rel="noopener">Watch</a>`;
            } else {
              td.textContent = '-';
            }
            break;
          default:
            td.textContent = val || '';
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

})();
</script>
</body>
</html>
